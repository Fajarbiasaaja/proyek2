version: '3.8'
services:
  app:
    build: .
    ports:
      - "8022:80"
    environment:
      - APP_ENV=local
      - APP_KEY=${APP_KEY}
      - DB_HOST= {127.0.0.1}
      - DB_DATABASE=${politech}
      - DB_USERNAME=${root}
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      - db

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: