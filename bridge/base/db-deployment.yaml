                      value: "root_password_123"
                  ports:
                    - name: db-33060
                      containerPort: 33060
                    - name: db-3306
                      containerPort: 3306
                  volumeMounts:
                    - name: var-lib-mysql
                      mountPath: /var/lib/mysql
            volumes:
                - name: var-lib-mysql
                  persistentVolumeClaim:
                    claimName: db-db-data
