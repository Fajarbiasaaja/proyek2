apiVersion: apps/v1
kind: Deployment
metadata:
    name: db
    namespace: proyek2
    labels:
        com.docker.compose.project: proyek2
        com.docker.compose.service: db
spec:
    replicas: 1
    selector:
        matchLabels:
            com.docker.compose.project: proyek2
            com.docker.compose.service: db
    strategy:
        type: Recreate
    template:
        metadata:
            labels:
                com.docker.compose.project: proyek2
                com.docker.compose.service: db
                com.docker.compose.network.default: "true"
        spec:
            containers:
                - name: db
                  image: mysql:8.0
